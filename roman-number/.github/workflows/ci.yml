name: Continuous Integration

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Compile project
        run: cd roman-number && mvn compile

      - name: Run unit tests
        run: cd roman-number && mvn test

      - name: Run static analysis
        run: cd roman-number && mvn package